# General & Environment
xwayland_persistence=0
env=XCURSOR_SIZE,24
env=XCURSOR_THEME,Adwaita

# Autostart
exec-once=swww-daemon

# Monitor Rules
monitorrule=name:eDP-1,scale:2

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
exchange_cross_monitor=1
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=15
cursor_theme=Adwaita
drag_tile_to_tile=1

# Input: Keyboard
repeat_rate=50
repeat_delay=250
numlockon=1
xkb_rules_layout=us

# Input: Trackpad (Requires relogin to apply)
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Input: Mouse (Requires relogin to apply)
mouse_natural_scrolling=0
